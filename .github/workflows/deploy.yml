name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Every deploy must carry a version number that has never been live before.
  # The marker for "was live" is a git tag v<version>, pushed only AFTER a
  # successful deploy (see the deploy job) — so re-running a failed deploy of
  # the same version is still allowed, but forgetting to bump before shipping
  # new bytes fails fast here.
  version-gate:
    name: Version must not already be deployed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Assert this version has no successful-deploy tag yet
        run: |
          VERSION=$(node -p "require('./trip/package.json').version")
          TAG="v$VERSION"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Version $VERSION was already deployed (tag $TAG exists). Bump trip/package.json before shipping."
            exit 1
          fi
          echo "OK — $VERSION not yet deployed ($TAG absent)."

  build:
    needs: version-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: trip/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Build static export (basePath + site URL derived from the repo)
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          # Public Firebase web config for optional cross-friend sync. NEXT_PUBLIC_* values
          # inline at build time, so the workflow must reference them here; absent the secrets
          # the expressions resolve empty and the site builds localStorage-only (no failure).
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_TRIP_ID: ${{ vars.NEXT_PUBLIC_TRIP_ID }}
          # AI concierge Worker URL (repo Actions variable). Absent => the chat feature
          # stays fully dormant in the build. Presence is echoed below (never the value).
          NEXT_PUBLIC_CONCIERGE_URL: ${{ vars.NEXT_PUBLIC_CONCIERGE_URL }}
        run: |
          echo "concierge-url present: ${NEXT_PUBLIC_CONCIERGE_URL:+yes}${NEXT_PUBLIC_CONCIERGE_URL:-NO}"
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: trip/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # contents: write is needed only to push the success-marker tag below; the
    # job-level block overrides the read-only default, so pages/id-token
    # (required by deploy-pages) are restated here.
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      # Only reached if deploy-pages succeeded (a failed step halts the job),
      # so the tag records a genuinely-live version, never a failed attempt.
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
      - name: Tag this version as successfully deployed
        run: |
          VERSION=$(node -p "require('./trip/package.json').version")
          TAG="v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists — nothing to record."
          else
            git tag -a "$TAG" -m "Successful GitHub Pages deploy of $TAG"
            git push origin "refs/tags/$TAG"
          fi
